# Strategy 1 — 基础 DCA（cn_etf_dca_basic）
# 参考：docs/benchmark_suite_v1.md 共享基线
name: cn_etf_dca_basic
market: cn_etf

universe:
  cash_symbol: "511990"            # 华宝添益 货币 ETF（现金池）
  risk_symbols:                    # 风险池（6 只 ETF 等权）
    - "510300"                     # 沪深300
    - "510500"                     # 中证500
    - "159915"                     # 创业板
    - "512100"                     # 中证1000
    - "512880"                     # 证券
    - "512170"                     # 医疗
  timeframe: 1d
  since: "2020-01-01"
  until: "2024-12-31"

strategy:
  type: dca_basic                  # 自定义策略类，registry 在合并阶段统一注册
  class: strategy_lib.strategies.cn_etf_dca_basic.DCABasicStrategy
  params:
    dca_amount: 5000               # 每月 DCA 金额（RMB）
    dca_frequency: "M"             # 月度（每月第 1 个交易日）
    risk_allocation: "equal"       # 风险池等权分配；可选 "inverse_price"

backtest:
  init_cash: 100000                # 共享基线：10w
  fees: 0.00005                    # 万 0.5
  slippage: 0.0005                 # 万 5

benchmark:
  symbol: "510300"                 # 沪深 300 ETF 买入持有
  init_cash: 100000
